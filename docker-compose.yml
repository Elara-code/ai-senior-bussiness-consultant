services:
  api:
    build: .
    environment:
      CONSULTANT_ENVIRONMENT: development
      CONSULTANT_AUTH_MODE: development
      CONSULTANT_DEVELOPMENT_AUTH_SECRET: local-compose-development-secret
      CONSULTANT_AUTO_EXECUTE_JOBS: "true"
      CONSULTANT_DATABASE_URL: postgresql+asyncpg://consultant:consultant@postgres:5432/consultant
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: consultant
      POSTGRES_PASSWORD: consultant
      POSTGRES_DB: consultant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultant -d consultant"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: consultant
      MINIO_ROOT_PASSWORD: consultant-local-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
