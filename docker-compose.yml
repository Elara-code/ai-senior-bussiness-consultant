services:
  web:
    build:
      context: ./web
    environment:
      CONSULTANT_API_URL: http://api:8000
      CONSULTANT_DEVELOPMENT_AUTH_SECRET: local-compose-development-secret
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api:
    build: .
    environment:
      CONSULTANT_ENVIRONMENT: development
      CONSULTANT_AUTH_MODE: development
      CONSULTANT_DEVELOPMENT_AUTH_SECRET: local-compose-development-secret
      CONSULTANT_AUTO_EXECUTE_JOBS: "true"
      CONSULTANT_DATABASE_URL: postgresql+asyncpg://consultant:consultant@postgres:5432/consultant
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: consultant
      POSTGRES_PASSWORD: consultant
      POSTGRES_DB: consultant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultant -d consultant"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: consultant
      MINIO_ROOT_PASSWORD: consultant-local-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
