name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: consultant
          POSTGRES_PASSWORD: consultant
          POSTGRES_DB: consultant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U consultant -d consultant_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://consultant:consultant@localhost:5432/consultant_test
      CONSULTANT_DATABASE_URL: postgresql+asyncpg://consultant:consultant@localhost:5432/consultant_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: PYTHONPATH=src alembic upgrade head
      - run: ruff check .
      - run: mypy src evals
      - run: pytest -q
      - run: python -m evals.run --provider fake
      - run: python -m evals.run --provider fake --dataset phase2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: docker build -t ai-business-consultant:test .
